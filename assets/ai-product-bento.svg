<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">AI 产品工作台视觉</title>
  <desc id="desc">深色产品工作台界面，包含需求洞察、Prompt 流程、体验评估与风险提示模块。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827" />
      <stop offset="0.55" stop-color="#151a25" />
      <stop offset="1" stop-color="#24182d" />
    </linearGradient>
    <linearGradient id="orangeViolet" x1="0" y1="0" x2="1" y2="1">
