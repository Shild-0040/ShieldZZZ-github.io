    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#05070d" flood-opacity="0.36" />
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)" />
